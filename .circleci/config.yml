# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  aarch64-test:
    machine:
      # https://circleci.com/developer/machine/image/ubuntu-2404
      image: ubuntu-2404:2026.05.1
    resource_class: arm.medium
    environment:
      RUNTIME_BASE: registry.access.redhat.com/ubi10-minimal:latest
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - checkout
      - run: |
            uname -a
            python3 --version
            # fail if not using Python 3
            python3 --version | grep "3\."

            make build-pkg

  aarch64-build-and-push:
    machine:
      # https://circleci.com/developer/machine/image/ubuntu-2404
      image: ubuntu-2404:2026.05.1
    resource_class: arm.medium
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - checkout
      - run: |
            uname -a
            python3 --version
            # fail if not using Python 3
            python3 --version | grep "3\."

            make upload-pkg


# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  aarch64-pkg-test:
    when:
      matches: { pattern: "^.+$", value: << pipeline.git.branch >> }
    jobs:
      - aarch64-test

  aarch64-pkg-release:
    jobs:
      - aarch64-build-and-push:
          filters:
            tags:
              only: /^v.+$/
            branches:
              ignore: /.*/
